name: Build and Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install frontend dependencies
        working-directory: frontend/AIExpenseTracker/ai-expense-tracker-ui-boilerplate-code
        run: npm install
      
      - name: Build frontend
        working-directory: frontend/AIExpenseTracker/ai-expense-tracker-ui-boilerplate-code
        run: npm run build
      
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./frontend/AIExpenseTracker/ai-expense-tracker-ui-boilerplate-code/dist
          cname: ''
